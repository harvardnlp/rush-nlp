projects:
    - link: https://github.com/zzstefan/BrainNetClass
      title: BrainNetClass
      abstract: A MATLAB toolbox for brain network construction and classification. Supports multiple connectivity estimation methods (Pearson correlation, sparse representation, high-order FC) and standard ML classifiers. Used for brain disorder diagnosis from resting-state fMRI data.
      image: /images/toolbox_paper.png
      pdf: https://onlinelibrary.wiley.com/doi/full/10.1002/hbm.24979

    - link: https://github.com/zzstefan/Distribution_matching
      title: Distribution Matching for Structural Connectivity Harmonization
      abstract: A Python implementation of distribution-matching harmonization for multi-site brain structural connectivity data. Addresses batch effects from scanner and protocol differences in diffusion MRI tractography, enabling pooling of large multi-site datasets.
      image: /images/distribution_matching.png
      pdf: https://onlinelibrary.wiley.com/doi/epdf/10.1002/hbm.70257

    - link: https://github.com/zzstefan/Multiscale-brain-aging
      title: Multiscale Brain Aging Analysis
      abstract: Code for discovering multiscale functional connectivity patterns associated with brain aging using harmonized rsfMRI data from the iSTAGING multi-cohort study (thousands of subjects). Combines data harmonization, graph-based connectivity, and machine learning for brain age prediction.
      image: /images/multiscale_aging.png
      pdf: https://www.sciencedirect.com/science/article/pii/S1053811923000599
